<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skripsi - Shade Finder</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f9f4f0; color: #4a3728; margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; }
        h2 { border-bottom: 2px solid #d4a373; padding-bottom: 10px; }
        .upload-area { border: 2px dashed #d4a373; padding: 40px; border-radius: 10px; margin: 20px 0; cursor: pointer; background: #fffaf5; }
        .btn { background-color: #d4a373; color: white; border: none; padding: 12px 25px; border-radius: 5px; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn:hover { background-color: #bc8a5f; }
        #preview { max-width: 100%; border-radius: 10px; display: none; margin-top: 15px; }
        .result-box { margin-top: 30px; padding: 20px; background: #fdf2e9; border-left: 5px solid #d4a373; display: none; text-align: left; }
    </style>
</head>
<body>

<div class="container">
    <h2>MakeUp Shade Finder</h2>
    <p>Unggah foto wajah Anda untuk menentukan shade yang cocok.</p>
    
    <div class="upload-area" onclick="document.getElementById('fileInput').click()">
        <p>Klik di sini untuk pilih foto</p>
        <input type="file" id="fileInput" hidden accept="image/*">
    </div>

    <img id="preview" alt="Preview Wajah">

    <div style="margin-top: 20px;">
        <button class="btn" onclick="prosesAnalisis()">Analisis Warna Kulit</button>
    </div>

    <div id="result" class="result-box">
        <h3>Hasil Analisis:</h3>
        <p><strong>Skin Tone:</strong> <span id="skinTone">-</span></p>
        <p><strong>Undertone:</strong> <span id="undertone">-</span></p>
        <p><strong>Rekomendasi Shade:</strong> <span id="shade">Pilih produk dengan dasar kuning/warm</span></p>
    </div>
</div>

<script>
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const resultBox = document.getElementById('result');

    fileInput.addEventListener('change', function() {
        const file = this.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                preview.src = e.target.result;
                preview.style.display = 'block';
            }
            reader.readAsDataURL(file);
        }
    });

    function prosesAnalisis() {
        // Logika sederhana simulasi analisis
        resultBox.style.display = 'block';
        document.getElementById('skinTone').innerText = "Medium / Kuning Langsat";
        document.getElementById('undertone').innerText = "Warm Undertone";
        
        window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
    }
</script>

</body>
</html>
